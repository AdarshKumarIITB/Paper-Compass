services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: papercompass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"

volumes:
  pgdata:
